<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>台股量能排行篩選器</title>
    <link rel="stylesheet" href="/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  </head>
  <body>
    <header class="topbar">
      <div class="brand-block">
        <span class="eyebrow">Yahoo 台股漲幅排行分析</span>
        <h1>台股量能排行篩選器</h1>
        <p>篩出 5 日均量大於 20 日均量，且至少連續 2 個交易日成立的強勢股。</p>
      </div>
      <div class="header-actions">
        <div class="status" id="status">準備掃描</div>
        <button id="refreshBtn" class="primary">重新掃描</button>
      </div>
    </header>

    <main>
      <section class="toolbar">
        <div class="segmented" role="tablist" aria-label="市場">
          <button class="active" data-market="listed">上市前100</button>
          <button data-market="otc">上櫃前100</button>
          <button data-market="allMarkets">上市 + 上櫃</button>
        </div>
        <div class="score-help">
          <strong>AI分數</strong>
          <span>滿分 100，綜合量能、MACD、KD、布林位置、流動性與量價買盤推估。</span>
        </div>
      </section>

      <section class="summary-grid">
        <div class="metric">
          <span>已分析股票</span>
          <strong id="totalCount">0</strong>
        </div>
        <div class="metric">
            <span>至少連續 2 日</span>
          <strong id="candidateCount">0</strong>
        </div>
        <div class="metric">
          <span>AI 推薦檔數</span>
          <strong id="recommendCount">0</strong>
        </div>
        <div class="metric">
          <span>最新掃描</span>
          <strong id="scanTime">-</strong>
        </div>
      </section>

      <section class="layout">
        <aside class="panel result-panel">
          <div class="panel-head">
            <div>
              <h2>篩選結果</h2>
              <p>點選股票查看技術圖表</p>
            </div>
            <span id="sourceLabel">上市</span>
          </div>
          <div id="stockList" class="stock-list"></div>
        </aside>

        <section class="detail">
          <div class="panel-head detail-head">
            <div>
              <h2 id="detailTitle">尚未選取股票</h2>
              <p id="detailSub">掃描完成後選擇股票查看技術分析。</p>
            </div>
            <a id="yahooLink" class="ghost" href="https://tw.stock.yahoo.com/rank/change-up" target="_blank" rel="noreferrer">Yahoo 來源</a>
          </div>

          <div class="recommend-box" id="recommendBox"></div>

          <div class="chart-tabs">
            <button class="active" data-chart="price">價量 / 布林</button>
            <button data-chart="macd">MACD</button>
            <button data-chart="kd">KD</button>
            <button data-chart="chip">大戶 / 籌碼</button>
          </div>
          <div id="chart" class="chart"></div>
          <div class="chip-note">
            分點進出與大戶持股屬交易所、集保或券商授權資料。本工具目前以公開日 K 價量推估籌碼壓力，後續可在後端接入授權 API 替換成真實籌碼資料。
          </div>
        </section>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
